aid: amazon-vpn
name: Amazon VPN
description: >-
  AWS VPN solutions establish secure connections between on-premises networks,
  remote offices, client devices, and the AWS global network. AWS offers two
  types of private connectivity: AWS Site-to-Site VPN and AWS Client VPN,
  enabling encrypted tunnels between your network and Amazon Virtual Private Cloud.
