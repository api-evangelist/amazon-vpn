apis:
  - aid: amazon-vpn:aws-vpn-api
    name: AWS VPN API
    description: >-
      The AWS VPN API (part of the Amazon EC2 API) provides programmatic access
      to create and manage VPN connections, customer gateways, virtual private
      gateways, and Client VPN endpoints. It enables configuration of Site-to-Site
      VPN and Client VPN for secure hybrid connectivity.
